<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | Burak Öztunc</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/mobile.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>

<body>

    <div id="particles"></div>

    <nav class="navbar">

        <div class="nav-container">

            <div class="logo">
                Burak<span>.</span>
            </div>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="nav-links">

                <a href="index.html">Home</a>
                <a href="projects.html">Projekte</a>
                <a href="contact.html">Kontakt</a>

            </div>

        </div>

    </nav>

    <section class="contact-page">

        <div class="container">

            <div class="contact-layout fade-up">

                <div class="contact-info">

                    <img src="assets/images/profile.jpg"
                        alt="Burak">

                    <h1>Kontakt</h1>

                    <p>
                        Du kannst mich gerne kontaktieren
                        für Projekte, Zusammenarbeit oder
                        Bewerbungen.
                    </p>

                    <div class="contact-details">

                        <div>
                            📧 deineemail@mail.com
                        </div>

                        <div>
                            💻 github.com/deinprofil
                        </div>

                        <div>
                            📍 Köln, Deutschland
                        </div>

                    </div>

                </div>

                <form class="contact-form">

                    <input type="text"
                        placeholder="Dein Name"
                        required>

                    <input type="email"
                        placeholder="Deine Email"
                        required>

                    <textarea
                        placeholder="Deine Nachricht"
                        required></textarea>

                    <button type="submit"
                        class="btn btn-primary">

                        Nachricht senden

                    </button>

                </form>

            </div>

        </div>

    </section>

    <button id="theme-toggle">
        🌙
    </button>

    <script type="module"
        src="assets/js/app.js"></script>

</body>
